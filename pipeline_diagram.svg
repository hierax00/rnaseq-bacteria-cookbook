<svg viewBox="0 0 780 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <title>RNA-seq Bacteria Pipeline</title>

  <!-- Background -->
  <rect width="780" height="620" fill="#f8f9fa" rx="12"/>

  <!-- SECTION LABELS -->
  <rect x="16" y="14" width="748" height="158" rx="8" fill="#e9ecef" opacity="0.7"/>
  <text x="30" y="34" font-size="11" font-weight="700" fill="#6c757d" letter-spacing="1">LINUX · PREPROCESSING</text>

  <rect x="16" y="184" width="748" height="418" rx="8" fill="#e9ecef" opacity="0.4"/>
  <text x="30" y="204" font-size="11" font-weight="700" fill="#6c757d" letter-spacing="1">R · ANALYSIS</text>

  <!-- LINUX NODES -->
  <rect x="30" y="44" width="120" height="52" rx="6" fill="#4361ee"/>
  <text x="90" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="white">Raw FASTQ</text>
  <text x="90" y="82" text-anchor="middle" font-size="10" fill="#c8d0ff">Paired-end reads</text>

  <rect x="190" y="44" width="120" height="52" rx="6" fill="#4361ee"/>
  <text x="250" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="white">fastp</text>
  <text x="250" y="82" text-anchor="middle" font-size="10" fill="#c8d0ff">Q30 · min 50 bp</text>

  <rect x="350" y="44" width="120" height="52" rx="6" fill="#4361ee"/>
  <text x="410" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="white">MultiQC</text>
  <text x="410" y="82" text-anchor="middle" font-size="10" fill="#c8d0ff">Aggregate QC</text>

  <rect x="350" y="112" width="120" height="44" rx="6" fill="#7209b7"/>
  <text x="410" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="white">Kraken2</text>
  <text x="410" y="146" text-anchor="middle" font-size="10" fill="#e0b3ff">Taxonomic check</text>

  <rect x="510" y="44" width="120" height="52" rx="6" fill="#4361ee"/>
  <text x="570" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="white">Kallisto quant</text>
  <text x="570" y="82" text-anchor="middle" font-size="10" fill="#c8d0ff">100 bootstraps</text>

  <rect x="630" y="112" width="120" height="44" rx="6" fill="#7209b7"/>
  <text x="690" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="white">eggNOG-mapper</text>
  <text x="690" y="146" text-anchor="middle" font-size="10" fill="#e0b3ff">Functional annotation</text>

  <!-- ARROWS -->
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4361ee"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7209b7"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2d9a5f"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f72585"/></marker>
    <marker id="ag2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#adb5bd"/></marker>
  </defs>

  <line x1="150" y1="70" x2="186" y2="70" stroke="#4361ee" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="310" y1="70" x2="346" y2="70" stroke="#4361ee" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="310" y1="84" x2="346" y2="126" stroke="#7209b7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ap)"/>
  <line x1="470" y1="70" x2="506" y2="70" stroke="#4361ee" stroke-width="2" marker-end="url(#ab)"/>

  <!-- R NODES -->
  <rect x="190" y="210" width="148" height="54" rx="6" fill="#7209b7" opacity="0.85"/>
  <text x="264" y="230" text-anchor="middle" font-size="11" font-weight="700" fill="white">0 · Taxonomy Report</text>
  <text x="264" y="246" text-anchor="middle" font-size="9.5" fill="#e0b3ff">Barplot · Sankey LCA</text>
  <text x="264" y="258" text-anchor="middle" font-size="9" fill="#e0b3ff" font-style="italic">independent step</text>

  <rect x="30" y="290" width="148" height="56" rx="6" fill="#2d9a5f"/>
  <text x="104" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="white">1 · Exploratory</text>
  <text x="104" y="328" text-anchor="middle" font-size="9.5" fill="#b8f0d2">tximport · DESeq2</text>
  <text x="104" y="342" text-anchor="middle" font-size="9.5" fill="#b8f0d2">VST · PCA</text>

  <rect x="210" y="290" width="148" height="56" rx="6" fill="#2d9a5f"/>
  <text x="284" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="white">2 · Normalization</text>
  <text x="284" y="328" text-anchor="middle" font-size="9.5" fill="#b8f0d2">ComBat_seq</text>
  <text x="284" y="342" text-anchor="middle" font-size="9.5" fill="#b8f0d2">median-of-ratios</text>

  <rect x="390" y="290" width="148" height="56" rx="6" fill="#2d9a5f"/>
  <text x="464" y="309" text-anchor="middle" font-size="11" font-weight="700" fill="white">3 · Differential</text>
  <text x="464" y="324" text-anchor="middle" font-size="11" font-weight="700" fill="white">Expression</text>
  <text x="464" y="340" text-anchor="middle" font-size="9.5" fill="#b8f0d2">padj&lt;0.01 · |log2FC|&gt;1</text>

  <rect x="570" y="290" width="178" height="56" rx="6" fill="#2d9a5f"/>
  <text x="659" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="white">4 · Functional</text>
  <text x="659" y="327" text-anchor="middle" font-size="11" font-weight="700" fill="white">Categorization</text>
  <text x="659" y="343" text-anchor="middle" font-size="9.5" fill="#b8f0d2">GO · KEGG · pathview</text>

  <rect x="210" y="400" width="360" height="56" rx="6" fill="#f72585"/>
  <text x="390" y="422" text-anchor="middle" font-size="11" font-weight="700" fill="white">5 · Advanced Analysis</text>
  <text x="390" y="438" text-anchor="middle" font-size="9.5" fill="#ffc8e8">GSEA · Virulence profiling · PPI networks (STRING + Louvain)</text>

  <rect x="110" y="500" width="560" height="50" rx="6" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="390" y="520" text-anchor="middle" font-size="11" font-weight="600" fill="#495057">Results: CSV tables · PDFs · TIFF figures (1200 DPI)</text>
  <text x="390" y="537" text-anchor="middle" font-size="10" fill="#6c757d">DEG lists · enrichment maps · PPI hubs · virulence heatmap · GSEA ridgeplot</text>

  <!-- R ARROWS -->
  <line x1="410" y1="156" x2="338" y2="210" stroke="#7209b7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ap)"/>
  <line x1="570" y1="96" x2="570" y2="160" stroke="#4361ee" stroke-width="2"/>
  <line x1="570" y1="160" x2="104" y2="160" stroke="#4361ee" stroke-width="2"/>
  <line x1="104" y1="160" x2="104" y2="286" stroke="#4361ee" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="690" y1="156" x2="690" y2="286" stroke="#7209b7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ap)"/>
  <line x1="178" y1="318" x2="206" y2="318" stroke="#2d9a5f" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="358" y1="318" x2="386" y2="318" stroke="#2d9a5f" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="538" y1="318" x2="566" y2="318" stroke="#2d9a5f" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="464" y1="346" x2="390" y2="396" stroke="#f72585" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="659" y1="346" x2="550" y2="396" stroke="#f72585" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="390" y1="456" x2="390" y2="496" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ag2)"/>

  <!-- LEGEND -->
  <rect x="30" y="560" width="14" height="14" rx="3" fill="#4361ee"/>
  <text x="50" y="572" font-size="10" fill="#6c757d">Linux tools</text>
  <rect x="130" y="560" width="14" height="14" rx="3" fill="#7209b7"/>
  <text x="150" y="572" font-size="10" fill="#6c757d">Annotation / taxonomy</text>
  <rect x="290" y="560" width="14" height="14" rx="3" fill="#2d9a5f"/>
  <text x="310" y="572" font-size="10" fill="#6c757d">Core R pipeline</text>
  <rect x="410" y="560" width="14" height="14" rx="3" fill="#f72585"/>
  <text x="430" y="572" font-size="10" fill="#6c757d">Advanced analysis</text>
  <line x1="535" y1="567" x2="555" y2="567" stroke="#4361ee" stroke-width="2"/>
  <text x="560" y="572" font-size="10" fill="#6c757d">data flow</text>
  <line x1="620" y1="567" x2="640" y2="567" stroke="#7209b7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="645" y="572" font-size="10" fill="#6c757d">side input</text>
</svg>
